# Gitleaks configuration
# Docs: https://github.com/gitleaks/gitleaks#configuration

title = "Chub gitleaks config"

[extend]
# Extend the default gitleaks ruleset
useDefault = true

[allowlist]
description = "Global allowlist"

# Ignore test fixture files and source files that intentionally contain test tokens
paths = [
  '''tests/fixtures/''',
  '''target/''',
  '''content/''',
  # Integration tests and unit tests contain intentional test secrets for validation
  '''crates/chub-core/tests/''',
  '''crates/chub-core/src/team/tracking/redact\.rs''',
  '''crates/chub-core/src/scan/scanner\.rs''',
  # Benchmark script corpus uses realistic-looking tokens for timing
  '''scripts/benchmark-scan\.sh''',
  # Rules/word list files contain regex patterns and common words, not real secrets
  '''crates/chub-core/src/scan/rules\.toml''',
  '''crates/chub-core/src/scan/words\.txt''',
  # Lock files (package-lock.json, yarn.lock, etc.) contain hashes, not secrets
  '''package-lock\.json''',
  '''yarn\.lock''',
  '''pnpm-lock\.yaml''',
]

# Ignore committed placeholder / example values in config examples
regexes = [
  # Placeholder tokens in documentation and config examples
  '''CHUB_COMPANY_TOKEN''',
  '''<your[-_]token>''',
  '''example[-_]key''',
  # cargo Cargo.lock checksums are not secrets
  '''checksum = "[0-9a-f]{64}"''',
]
